name: Build and Release

on:
  push:
    tags:
      - "v*"  # Triggers on tags like v1.0.0, v0.2.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --clean tunescope.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneScope-Windows
          path: dist/TuneScope.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsndfile1 libgl1-mesa-glx libegl1-mesa

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --clean tunescope.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneScope-Linux
          path: dist/TuneScope

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: TuneScope-Windows
          path: release-assets

      - uses: actions/download-artifact@v4
        with:
          name: TuneScope-Linux
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## TuneScope ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `TuneScope.exe` (standalone, no Python required)
            - **Linux**: `TuneScope` (AppImage-style binary)

            ### Install
            Download the executable for your platform and run it directly.
          files: |
            release-assets/*
          generate_release_notes: true
